<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'wasm-unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: http://127.0.0.1:* http://localhost:*; connect-src 'self' http://127.0.0.1:* http://localhost:*; font-src 'self' data:; object-src 'none'; base-uri 'self'; form-action 'self'">
  <title>Nichoir WASM</title>
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="./style.css?v=20260619-high-detail-library-preview">
</head>
<body>
  <div id="app" class="app-shell">
    <div class="loading" data-loading-message>Chargement du module WebAssembly...</div>
  </div>
	  <script>
	    (function () {
	      var queryLang = new URLSearchParams(window.location.search).get('lang');
	      var lang = queryLang === 'fr' || queryLang === 'en' ? queryLang : localStorage.getItem('nichoir-lang');
	      if (lang !== 'fr' && lang !== 'en') {
		lang = (navigator.language || '').toLowerCase().indexOf('en') === 0 ? 'en' : 'fr';
	      }
	      localStorage.setItem('nichoir-lang', lang);
	      document.documentElement.lang = lang;
      document.title = 'Nichoir WASM';
      var node = document.querySelector('[data-loading-message]');
      if (node) {
        node.textContent = lang === 'en' ? 'Loading WebAssembly module...' : 'Chargement du module WebAssembly...';
      }
    }());
  </script>
  <script type="module" src="./app.js?v=20260619-high-detail-library-preview"></script>
</body>
</html>
